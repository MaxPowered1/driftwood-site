# Netlify configuration — static site, no build step.
[build]
  publish = "."

# Sensible security headers for a static marketing site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
